<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vulnerable App{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e94560;
        }
        
        .navbar h1 {
            color: #e94560;
            font-size: 1.5rem;
        }
        
        .navbar h1 span {
            color: #0f3460;
            background: #e94560;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .nav-links {
            display: flex;
            gap: 1rem;
        }
        
        .nav-links a {
            color: #eee;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .nav-links a:hover {
            background: #e94560;
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        
        .card h2 {
            color: #e94560;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }
        
        .warning-banner {
            background: linear-gradient(90deg, #ff6b6b, #e94560);
            padding: 1rem;
            text-align: center;
            font-weight: bold;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        label {
            font-weight: 500;
            color: #ccc;
        }
        
        input[type="text"],
        input[type="password"],
        input[type="email"],
        textarea,
        select {
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }
        
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #e94560;
        }
        
        button, .btn {
            padding: 0.75rem 1.5rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        button:hover, .btn:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }
        
        .result {
            background: rgba(0, 0, 0, 0.5);
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
            overflow-x: auto;
        }
        
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid #ff6b6b;
        }
        
        .success {
            color: #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
            padding: 1rem;
            border-radius: 4px;
            border-left: 4px solid #4ecdc4;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        th {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }
        
        .hint {
            background: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ffc107;
            padding: 1rem;
            margin: 1rem 0;
            color: #ffc107;
        }
        
        .vulnerability-tag {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }

        /* Custom CSS injection styles will be inserted here */
        {{ custom_css|safe if custom_css else '' }}
    </style>
</head>
<body>
    <div class="warning-banner">
        ⚠️ WARNING: This application contains intentional security vulnerabilities. For testing purposes only!
    </div>
    
    <nav class="navbar">
        <h1><span>VUL</span> Vulnerable App</h1>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/admin">Admin</a>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <script>
        // VULNERABILITY: Inline JavaScript that could be exploited
        console.log("App loaded - Debug mode enabled");
    </script>
</body>
</html>
